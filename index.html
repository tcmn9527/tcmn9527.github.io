<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tcmn9527的github收藏夹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        /* 星空画布全屏覆盖 */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0c1445 0%, #020517 100%);
            z-index: -1;
        }
        /* 内容容器居中 */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }
        /* 星空卡片样式 毛玻璃发光 */
        .star-card {
            width: min(550px, 100%);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(160, 190, 255, 0.18);
            border-radius: 16px;
            padding: 22px 28px;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(120, 160, 255, 0.1);
        }
        /* 卡片悬浮星辰发光动画 */
        .star-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(130, 180, 255, 0.4);
            box-shadow: 0 0 40px rgba(100, 160, 255, 0.35), 0 0 80px rgba(60, 120, 255, 0.15);
        }
        .item-name {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #e6f0ff;
            text-shadow: 0 0 8px rgba(160, 200, 255, 0.4);
        }
        .item-url a {
            font-size: 15px;
            color: #88ccff;
            text-decoration: none;
            word-break: break-all;
            transition: color 0.3s;
        }
        .item-url a:hover {
            color: #ffffff;
            text-shadow: 0 0 12px #66b8ff;
        }
    </style>
</head>
<body>
    <!-- 星空动画画布 -->
    <canvas id="starCanvas"></canvas>

    <!-- 网址列表区域 -->
    <div class="wrapper">
        <!-- 条目1 -->
        <div class="star-card">
            <div class="item-name">中国学生现用课本</div>
            <div class="item-url">
                <a href="https://github.com/TapXWorld/ChinaTextbook/" target="_blank">https://github.com/TapXWorld/ChinaTextbook/</a>
            </div>
        </div>
    </div>

    <!-- JS星空粒子动态效果 -->
    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        // 适配窗口尺寸
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 星辰粒子类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                // 星辰大小分层
                this.radius = Math.random() * 1.8 + 0.2;
                // 闪烁速度
                this.twinkleSpeed = Math.random() * 0.015 + 0.003;
                this.opacity = Math.random();
                this.direction = Math.random() > 0.5 ? 1 : -1;
                // 缓慢移动
                this.moveX = (Math.random() - 0.5) * 0.3;
                this.moveY = (Math.random() - 0.5) * 0.3;
            }
            // 更新星辰闪烁、位置
            update() {
                this.opacity += this.twinkleSpeed * this.direction;
                if (this.opacity > 1) this.direction = -1;
                if (this.opacity < 0.1) this.direction = 1;

                this.x += this.moveX;
                this.y += this.moveY;
                // 边界循环
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            // 绘制星辰
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220, 240, 255, ${this.opacity})`;
                ctx.fill();
                // 大星星添加光晕
                if(this.radius > 1.2) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(160, 200, 255, ${this.opacity * 0.2})`;
                    ctx.fill();
                }
            }
        }

        // 生成800颗星辰
        function createStars() {
            stars = [];
            for(let i = 0; i < 800; i++) {
                stars.push(new Star());
            }
        }
        createStars();

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
