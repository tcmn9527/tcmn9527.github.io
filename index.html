<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tcmn9527的github收藏夹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }
        /* 星空画布全屏背景 */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0c1445 0%, #020517 100%);
            z-index: -1;
        }
        /* 容器铺满全屏，承载可拖拽星辰 */
        .star-box-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        /* 圆形星辰卡片核心样式 */
        .star-item {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(130,180,255,0.15) 0%, rgba(255,255,255,0.04) 70%, transparent 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(160, 200, 255, 0.25);
            box-shadow: 0 0 30px rgba(100, 160, 255, 0.2), inset 0 0 25px rgba(140,190,255,0.1);
            position: absolute;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }
        /* 拖拽激活状态 */
        .star-item:active {
            cursor: grabbing;
            transform: scale(1.12);
            box-shadow: 0 0 60px rgba(80, 170, 255, 0.5), inset 0 0 35px rgba(150,200,255,0.18);
        }
        /* 悬浮发光增强 */
        .star-item:hover {
            transform: scale(1.06);
            box-shadow: 0 0 45px rgba(90, 165, 255, 0.38), inset 0 0 30px rgba(145,195,255,0.15);
        }
        .item-name {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: #e6f0ff;
            text-shadow: 0 0 8px rgba(160, 200, 255, 0.45);
        }
        .item-url a {
            font-size: 12px;
            color: #99ccff;
            text-decoration: none;
            word-break: break-all;
            transition: color 0.3s;
        }
        .item-url a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #77bfff;
        }
    </style>
</head>
<body>
    <!-- 动态星空背景画布 -->
    <canvas id="starCanvas"></canvas>

    <!-- 拖拽星辰容器 -->
    <div class="star-box-container" id="dragContainer">
        <!-- 星辰条目1 -->
        <div class="star-item" data-id="item1">
            <div class="item-name">中国学生课本</div>
            <div class="item-url">
                <a href="https://github.com/TapXWorld/ChinaTextbook/" target="_blank">点击打开</a>
            </div>
        </div>
        <!-- 星辰条目2 -->
        <div class="star-item" data-id="item2">
            <div class="item-name">中国学生课本</div>
            <div class="item-url">
                <a href="https://github.com/TapXWorld/ChinaTextbook/" target="_blank">点击打开</a>
            </div>
        </div>
        <!-- 新增测试星辰 -->
        <div class="star-item" data-id="item3">
            <div class="item-name">中国学生课本</div>
            <div class="item-url">
                <a href="https://github.com/TapXWorld/ChinaTextbook/" target="_blank">点击打开</a>
            </div>
        </div>
    </div>

    <script>
        // ========== 1. 星空粒子背景动画 ==========
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class BgStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 1.8 + 0.2;
                this.twinkleSpeed = Math.random() * 0.015 + 0.003;
                this.opacity = Math.random();
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.moveX = (Math.random() - 0.5) * 0.3;
                this.moveY = (Math.random() - 0.5) * 0.3;
            }
            update() {
                this.opacity += this.twinkleSpeed * this.direction;
                if (this.opacity > 1) this.direction = -1;
                if (this.opacity < 0.1) this.direction = 1;
                this.x += this.moveX;
                this.y += this.moveY;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220, 240, 255, ${this.opacity})`;
                ctx.fill();
                if(this.radius > 1.2) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(160, 200, 255, ${this.opacity * 0.2})`;
                    ctx.fill();
                }
            }
        }
        function createBgStars() {
            stars = [];
            for(let i = 0; i < 1000; i++) stars.push(new BgStar());
        }
        createBgStars();
        function animateStarBg() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animateStarBg);
        }
        animateStarBg();

        // ========== 2. 星辰自主漫游+避障+边界反弹核心配置 ==========
        const items = Array.from(document.querySelectorAll('.star-item'));
        const storageKey = 'starItemPositionData';
        const ITEM_SIZE = 160;
        const ITEM_RADIUS = ITEM_SIZE / 2;
        const SAFE_DISTANCE = ITEM_RADIUS * 2.6; // 预警避让距离
        const MAX_SPEED = 0.7; // 漫游最大速度（数值越小越慢）
        const CHANGE_DIR_INTERVAL = 4500; // 随机改变方向间隔(ms)
        const BOUND_BOUNCE_FACTOR = -0.9; // 边界反弹系数，负数代表反向

        let positionData = JSON.parse(localStorage.getItem(storageKey)) || {};
        let dragTarget = null;
        let hoverTarget = null; // 新增：当前鼠标悬浮的星辰
        let dragOffsetX = 0, dragOffsetY = 0;

        // 给每个星辰绑定自主漫游数据
        items.forEach(el => {
            el.ai = {
                vx: (Math.random() - 0.5) * MAX_SPEED,
                vy: (Math.random() - 0.5) * MAX_SPEED,
                nextDirTime: Date.now() + Math.random() * CHANGE_DIR_INTERVAL
            }
            // 悬浮移入：停止移动
            el.addEventListener('mouseover', () => {
                hoverTarget = el;
            })
            // 悬浮移出：恢复移动
            el.addEventListener('mouseout', () => {
                if(hoverTarget === el) hoverTarget = null;
            })
        })

        // 获取星辰中心点
        function getCenter(el) {
            const left = parseFloat(el.style.left || 0);
            const top = parseFloat(el.style.top || 0);
            return {
                x: left + ITEM_RADIUS,
                y: top + ITEM_RADIUS
            };
        }

        // 边界碰撞检测，碰到边缘反向速度
        function wallBounce(el, x, y) {
            const maxX = window.innerWidth - ITEM_SIZE;
            const maxY = window.innerHeight - ITEM_SIZE;
            let newX = x;
            let newY = y;

            // 左右边界反弹，反转水平速度
            if (x <= 0) {
                el.ai.vx *= BOUND_BOUNCE_FACTOR;
                newX = 1;
            }
            if (x >= maxX) {
                el.ai.vx *= BOUND_BOUNCE_FACTOR;
                newX = maxX - 1;
            }

            // 上下边界反弹，反转垂直速度
            if (y <= 0) {
                el.ai.vy *= BOUND_BOUNCE_FACTOR;
                newY = 1;
            }
            if (y >= maxY) {
                el.ai.vy *= BOUND_BOUNCE_FACTOR;
                newY = maxY - 1;
            }
            return { x: newX, y: newY };
        }

        // 设置位置+边界锁定
        function setPosition(el, x, y) {
            const maxX = window.innerWidth - ITEM_SIZE;
            const maxY = window.innerHeight - ITEM_SIZE;
            x = Math.max(0, Math.min(maxX, x));
            y = Math.max(0, Math.min(maxY, y));
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            positionData[el.dataset.id] = {x, y};
        }

        // 避障逻辑：检测临近星辰，产生避让斥力
        function avoidObstacle(self) {
            const selfC = getCenter(self);
            let steerX = 0, steerY = 0;
            let count = 0;

            for(const other of items) {
                if(other === self) continue;
                const oC = getCenter(other);
                const dx = selfC.x - oC.x;
                const dy = selfC.y - oC.y;
                const dist = Math.hypot(dx, dy);

                // 进入预警范围，生成避让力
                if(dist < SAFE_DISTANCE) {
                    const force = (SAFE_DISTANCE - dist) / SAFE_DISTANCE;
                    steerX += dx / dist * force;
                    steerY += dy / dist * force;
                    count++;
                }
            }

            if(count > 0) {
                // 叠加避让力，修正移动方向
                self.ai.vx += steerX * 0.03;
                self.ai.vy += steerY * 0.03;
            }
        }

        // 随机切换漫游方向
        function randomChangeDir(starAI) {
            starAI.vx = (Math.random() - 0.5) * MAX_SPEED;
            starAI.vy = (Math.random() - 0.5) * MAX_SPEED;
        }

        // 限制速度不超速
        function limitSpeed(starAI) {
            const spd = Math.hypot(starAI.vx, starAI.vy);
            if(spd > MAX_SPEED) {
                starAI.vx = starAI.vx / spd * MAX_SPEED;
                starAI.vy = starAI.vy / spd * MAX_SPEED;
            }
        }

        // 主漫游循环
        function roamLoop() {
            const now = Date.now();
            items.forEach(el => {
                // 拖拽中 或 鼠标悬浮在当前星辰上 → 停止自动移动
                if(el === dragTarget || el === hoverTarget) return;

                // 定时随机换方向
                if(now > el.ai.nextDirTime) {
                    randomChangeDir(el.ai);
                    el.ai.nextDirTime = now + CHANGE_DIR_INTERVAL + Math.random() * 3000;
                }

                // 执行避障转向
                avoidObstacle(el);
                limitSpeed(el.ai);

                // 计算下一帧坐标
                let nextX = parseFloat(el.style.left) + el.ai.vx;
                let nextY = parseFloat(el.style.top) + el.ai.vy;

                // 检测屏幕边界，碰到边缘反向速度
                const bounced = wallBounce(el, nextX, nextY);
                nextX = bounced.x;
                nextY = bounced.y;

                // 更新位置
                setPosition(el, nextX, nextY);
            })
            requestAnimationFrame(roamLoop);
        }
        roamLoop();

        // 初始化星辰位置
        items.forEach(item => {
            const id = item.dataset.id;
            if(positionData[id]) {
                setPosition(item, positionData[id].x, positionData[id].y);
            } else {
                const rx = Math.random() * (window.innerWidth - ITEM_SIZE);
                const ry = Math.random() * (window.innerHeight - ITEM_SIZE);
                setPosition(item, rx, ry);
            }
        });

        // ========== 拖拽交互逻辑 ==========
        items.forEach(item => {
            item.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'A') return;
                dragTarget = item;
                dragTarget.style.zIndex = 999;
                const rect = item.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (!dragTarget) return;
            const newX = e.clientX - dragOffsetX;
            const newY = e.clientY - dragOffsetY;
            setPosition(dragTarget, newX, newY);
        });

        document.addEventListener('mouseup', () => {
            if (!dragTarget) return;
            dragTarget.style.zIndex = 1;
            dragTarget = null;
            localStorage.setItem(storageKey, JSON.stringify(positionData));
        });
    </script>
</body>
</html>
