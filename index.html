<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网址清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            padding: 30px;
            background-color: #f5f7fa;
        }
        .list-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .item-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .item-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 6px;
        }
        .item-url a {
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
            word-break: break-all;
        }
        .item-url a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="list-container">
        <!-- 列表项1 -->
        <div class="item-card">
            <div class="item-name">中国学生现用课本</div>
            <div class="item-url">
                <a href="https://github.com/TapXWorld/ChinaTextbook/" target="_blank">https://github.com/TapXWorld/ChinaTextbook/</a>
            </div>
        </div>

        <!-- 可无限复制 .item-card 新增更多网址 -->
    </div>
</body>
</html>
